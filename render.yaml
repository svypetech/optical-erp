services:
  - type: web
    name: business-ledger
    runtime: node
    plan: starter
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install && npm rebuild better-sqlite3
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: ledger-data
      mountPath: /var/data
      sizeGB: 1
